<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // GitHub Pages SPA redirect
      // Stores the path and redirects to root so React Router can handle it
      var path = window.location.pathname.replace('/hako-v2', '') || '/'
      sessionStorage.setItem('redirect', path)
      window.location.replace('/hako-v2/')
    </script>
  </head>
  <body></body>
</html>
